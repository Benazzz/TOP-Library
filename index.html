<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Library</title>
</head>
<body>
    <button class="new-book">New book</button>
    <dialog>
        <form>
            <h2>Add a New Book</h2>
            <br>
            <label>
                Title: <input name="title" id="title" required>
            </label> 
            <br>
            <label>
                Author: <input name="author" id="author" required>
            </label> 
            <br>
            <label>
                Pages: <input name="pages" id="pages" type="number" required>
            </label> 
            <br>
            <div>
                <button type="button" id="cancel">Cancel</button>
                <button type="submit">Add Book</button>
            </div>
        </form>
    </dialog>
    <div class="container">
    </div>
</body>
</html>
